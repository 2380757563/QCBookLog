# 适配QC Booklog前端的HTTPS配置（无重启，支持热加载）
server {
    listen 443 ssl;
    server_name unripora-1.li-likert.ts.net;

    # 容器内证书路径（对应挂载的飞牛OS证书目录）
    ssl_certificate /etc/nginx/ssl/unripora-1.li-likert.ts.net.crt;
    ssl_certificate_key /etc/nginx/ssl/unripora-1.li-likert.ts.net.key;

    # 基础TLS配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # QC Booklog前端静态文件路径
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由重写
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端API
    location /api {
        proxy_pass http://backend:7401;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 安全加固
    location ~ /\.ht {
        deny all;
    }
}